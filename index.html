       var pi = res.filter(function(r){return r.success;}).map(function(r){return r.blob;});
       if(pi.length === 0) return res;
       return mkPDF(pi).then(function(cb) {
         return [{ file: { name: 'Merged_Documents.pdf' }, blob: cb, success: true }];
       });
     } else if(fmt === 'gif') {
       var gi = res.filter(function(r){return r.success;}).map(function(r){return r.blob;});
       if(gi.length === 0) return res;
       return mkGIF(gi).then(function(cb) {
         return [{ file: { name: 'Animation_Meme.gif' }, blob: cb, success: true }];
       });
     }
     return res;
   }).then(function(finalOut) {
     rd = finalOut;
     rd.forEach(function(item) { if(item.blob && !item.blobUrl) item.blobUrl = URL.createObjectURL(item.blob); });
     
     cnt.users += 1; cnt.files += fs.length; scnt();
     document.getElementById('su').textContent = cnt.users;
     document.getElementById('sf').textContent = cnt.files;

     var rem = CD;
     bt.textContent = tr('cd_t') + ' (' + rem + 's)';
     
     var iv = setInterval(function() {
       rem--;
       if(rem <= 0) {
         clearInterval(iv);
         cvt.classList.remove('cd-mode');
         bt.disabled = false;
         var hasFail = rd.some(function(r){return !r.success;});
         bt.textContent = hasFail ? tr('fail') : tr('done');
       } else {
         bt.textContent = tr('cd_t') + ' (' + rem + 's)';
       }
     }, 1000);
   });
 }

 function draw(srcBlob, targetFormat, origFile, cb) {
   var reader = new FileReader();
   reader.onload = function(e) {
     var img = new Image();
     img.onload = function() {
       var cvs = document.createElement('canvas');
       cvs.width = img.width; cvs.height = img.height;
       var ctx = cvs.getContext('2d');
       if(targetFormat === 'jpg') { ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0,0,cvs.width,cvs.height); }
       ctx.drawImage(img, 0, 0);
       var mime = 'image/png', q = undefined;
       if(targetFormat === 'webp') { mime = 'image/webp'; q = 0.85; }
       else if(targetFormat === 'jpg') { mime = 'image/jpeg'; q = 0.9; }
       cvs.toBlob(function(b) { cb({ file: origFile, blob: b, success: !!b }); }, mime, q);
     };
     img.onerror = function() { cb({ file: origFile, success: false }); };
     img.src = e.target.result;
   };
   reader.onerror = function() { cb({ file: origFile, success: false }); };
   reader.readAsDataURL(srcBlob);
 }

 function mkPDF(blobs) {
   return new Promise(function(resolve) {
     var pdf = new jspdf.jsPDF('p', 'mm', 'a4');
     var idx = 0;
     function next() {
       if(idx >= blobs.length) { resolve(pdf.output('blob')); return; }
       var reader = new FileReader();
       reader.onload = function(e) {
         var img = new Image();
         img.onload = function() {
           if(idx > 0) pdf.addPage();
           var pw = pdf.internal.pageSize.getWidth(), ph = pdf.internal.pageSize.getHeight();
           var ratio = Math.min(pw / img.width, ph / img.height), w = img.width * ratio, h = img.height * ratio;
           pdf.addImage(e.target.result, 'JPEG', (pw - w)/2, (ph - h)/2, w, h);
           idx++; next();
         };
         img.src = e.target.result;
       };
       reader.readAsDataURL(blobs[idx]);
     }
     next();
   });
 }

 function mkGIF(blobs) {
   return new Promise(function(resolve) {
     var first = blobs[0];
     if(first && first.type.startsWith('video/')) {
       gifshot.createGIF({ video: [URL.createObjectURL(first)], numFrames: 12, frameDuration: 2 }, function(obj) {
         if(!obj.error) { fetch(obj.image).then(function(r){return r.blob();}).then(resolve); } else { resolve(first); }
       });
     } else {
       var urls = blobs.map(function(b){return URL.createObjectURL(b);});
       gifshot.createGIF({ images: urls, interval: 0.4 }, function(obj) {
         if(!obj.error) { fetch(obj.image).then(function(r){return r.blob();}).then(resolve); } else { resolve(first); }
       });
     }
   });
 }

 function bufferToWav(buf) {
   var nch = buf.numberOfChannels, len = buf.length * nch * 2 + 44, ab = new ArrayBuffer(len), view = new DataView(ab), chs = [], i, s, offset = 0, pos = 0;
   function set16(d) { view.setUint16(pos, d, true); pos += 2; }
   function set32(d) { view.setUint32(pos, d, true); pos += 4; }
   set32(0x46464952); set32(len - 8); set32(0x45564157); set32(0x20746d66); set32(16); set16(1); set16(nch); set32(buf.sampleRate); set32(buf.sampleRate * 2 * nch); set16(nch * 2); set16(16); set32(0x61746164); set32(len - pos - 4);
   for(i = 0; i < nch; i++) chs.push(buf.getChannelData(i));
   while(pos < len) {
     for(i = 0; i < nch; i++) {
       s = Math.max(-1, Math.min(1, chs[i][offset]));
       s = s < 0 ? s * 0x8000 : s * 0x7FFF;
       view.setInt16(pos, s, true); pos += 2;
     }
     offset++;
   }
   return new Blob([view], { type: 'audio/mp3' });
 }
