        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) startBatchProcess(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) startBatchProcess(e.target.files);
    });

    async function startBatchProcess(files) {
        const currentLang = langSelect.value;
        const targetFormat = formatSelect.value;
        
        let fileList = Array.from(files).sort((a, b) => {
            return a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' });
        });

        if (fileList.length === 0) {
            alert(i18n[currentLang].alert);
            return;
        }

        fileInput.value = "";

        downloadContainer.innerHTML = '';
        downloadContainer.style.display = 'none';
        countdownPanel.style.display = 'block';

        let timeLeft = 5;
        countdownText.innerText = `${i18n[currentLang].processing} ${timeLeft}s`;
        
        const timerPromise = new Promise((resolve) => {
            const timer = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    countdownText.innerText = `${i18n[langSelect.value].processing} ${timeLeft}s${i18n[langSelect.value].decoding}`;
                } else {
                    clearInterval(timer);
                    resolve();
                }
            }, 1000);
        });

        let finalOutputs = [];
        try {
            if (targetFormat === 'pdf') {
                const pdfData = await processToPdf(fileList);
                finalOutputs.push(pdfData);
            } else if (targetFormat === 'gif') {
                const gifData = await processToGif(fileList);
                finalOutputs.push(gifData);
            } else {
                const conversionPromises = fileList.map(async (file) => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    const isHEIC = ext === 'heic';
                    const isMedia = file.type.startsWith('audio/') || file.type.startsWith('video/');

                    if (isMedia || targetFormat === 'mp3') {
                        return await processMedia(file);
                    } else {
                        return await processImage(file, targetFormat, isHEIC);
                    }
                });
                finalOutputs = await Promise.all(conversionPromises);
            }

            await timerPromise; 
            
            countdownPanel.style.display = 'none';
            downloadContainer.style.display = 'flex';

            finalOutputs.forEach(data => {
                if(!data) return;
                const btn = document.createElement('a');
                btn.className = 'download-btn';
                btn.href = data.url;
                btn.download = data.filename;
                
                const nameSpan = document.createElement('span');
                nameSpan.style.overflow = 'hidden';
                nameSpan.style.textOverflow = 'ellipsis';
                nameSpan.style.whiteSpace = 'nowrap';
                nameSpan.style.maxWidth = '60%';
                nameSpan.innerText = data.filename;

                const metaSpan = document.createElement('span');
                metaSpan.style.fontSize = '12px';
                metaSpan.style.opacity = '0.9';
                metaSpan.innerText = `${i18n[currentLang].btnText} ${data.meta}`;

                btn.appendChild(nameSpan);
                btn.appendChild(metaSpan);
                downloadContainer.appendChild(btn);
            });

        } catch (error) {
            countdownPanel.style.display = 'none';
            alert(`Conversion Error: ${error.message || error}`);
        }
    }

    function processImage(file, targetFormat, isHEIC = false) {
        return new Promise(async (resolve, reject) => {
            try {
                let blobToProcess = file;
                if (isHEIC) {
                    const decodedBlob = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.9 });
                    blobToProcess = Array.isArray(decodedBlob) ? decodedBlob[0] : decodedBlob;
                }

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');

                        if (targetFormat === 'jpg') {
                            ctx.fillStyle = '#FFFFFF';
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                        }
                        ctx.drawImage(img, 0, 0);

                        let mimeType = 'image/png';
                        let quality = undefined;
                        if (targetFormat === 'webp') { mimeType = 'image/webp'; quality = 0.8; }
                        else if (targetFormat === 'jpg') { mimeType = 'image/jpeg'; quality = 0.9; }
                        
                        const dataUrl = canvas.toDataURL(mimeType, quality);
                        const originalName = file.name.substring(0, file.name.lastIndexOf('.')) || 'image';
                        
                        resolve({
                            url: dataUrl,
                            filename: originalName + '.' + targetFormat,
                            meta: `(${targetFormat.toUpperCase()} ${img.width}x${img.height})`
                        });
                    };
                    img.onerror = () => reject("Image render error");
                    img.src = event.target.result;
                };
                reader.readAsDataURL(blobToProcess);
            } catch (err) {
                reject("HEIC local decoder failed: " + err.message);
            }
        });
    }

    async function processMedia(file) {
        return new Promise(async (resolve, reject) => {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioCtx.decodeAudioData(arrayBuffer, function(audioBuffer) {
                    const wavBlob = bufferToWav(audioBuffer);
                    const url = URL.createObjectURL(wavBlob);
                    const originalName = file.name.substring(0, file.name.lastIndexOf('.')) || 'media';
                    resolve({ url: url, filename: originalName + '.mp3', meta: `(MP3 Audio)` });
                }, function() {
                    reject(`Media format unsupported locally for ${file.name}`);
                });
            } catch (err) { reject(err); }
        });
    }

    async function processToPdf(fileList) {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        
        const imgFiles = fileList.filter(f => f.type.startsWith('image/') || f.name.toLowerCase().endsWith('.heic'));
        if (imgFiles.length === 0) throw new Error("No valid images found for PDF conversion.");

        let isFirstPage = true;

        for (const file of imgFiles) {
            const isHEIC = file.name.toLowerCase().endsWith('.heic');
            const imgData = await processImage(file, 'jpg', isHEIC);

            await new Promise((resolveReady) => {
                const img = new Image();
                img.onload = function() {
                    if (!isFirstPage) {
                        pdf.addPage();
                    } else {
                        isFirstPage = false;
                    }

                    const pageWidth = pdf.internal.pageSize.getWidth();
                    const pageHeight = pdf.internal.pageSize.getHeight();
                    
                    const ratio = Math.min(pageWidth / img.width, pageHeight / img.height);
                    const w = img.width * ratio;
                    const h = img.height * ratio;
                    
                    pdf.addImage(imgData.url, 'JPEG', (pageWidth - w) / 2, (pageHeight - h) / 2, w, h);
                    resolveReady();
                };
                img.src = imgData.url;
            });
        }

        const pdfUrl = pdf.output('bloburl');
        return { url: pdfUrl, filename: 'Merged_Documents.pdf', meta: `(PDF Bundle)` };
    }

    function processToGif(fileList) {
        return new Promise((resolve, reject) => {
            const mediaFile = fileList[0];
            if (!mediaFile) return reject("No file provided.");

            if (mediaFile.type.startsWith('video/')) {
                const videoUrl = URL.createObjectURL(mediaFile);
                gifshot.createGIF({ video: [videoUrl], numFrames: 15, frameDuration: 2, sampleInterval: 10 }, function(obj) {
                    if (!obj.error) {
                        resolve({ url: obj.image, filename: 'Animation_Meme.gif', meta: `(GIF Live)` });
                    } else { reject("GIF processing failed."); }
                });
            } else {
                const imgUrls = fileList.filter(f => f.type.startsWith('image/')).map(f => URL.createObjectURL(f));
                if(imgUrls.length === 0) return reject("Please drop a video or image sequence.");
                gifshot.createGIF({ images: imgUrls, interval: 0.5 }, function(obj) {
                    if (!obj.error) {
                        resolve({ url: obj.image, filename: 'Photo_Slide.gif', meta: `(GIF Slide)` });
                    } else { reject("GIF multi-frame creation failed."); }
                });
            }
        });
    }

    function bufferToWav(buffer) {
        let numOfChan = buffer.numberOfChannels, length = buffer.length * numOfChan * 2 + 44,
            bufferArr = new ArrayBuffer(length), view = new DataView(bufferArr),
            channels = [], i, sample, offset = 0, pos = 0;
        function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
        function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }
        setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157); setUint32(0x20746d66);
        setUint32(16); setUint16(1); setUint16(numOfChan); setUint32(buffer.sampleRate);
        setUint32(buffer.sampleRate * 2 * numOfChan); setUint16(numOfChan * 2); setUint16(16);
        setUint32(0x61746164); setUint32(length - pos - 4);
        for(i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));
        while(pos < length) {
            for(i = 0; i < numOfChan; i++) {
                sample = Math.max(-1, Math.min(1, channels[i][offset])); 
                sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                view.setInt16(pos, sample, true); pos += 2;
            }
            offset++;
        }
        return new Blob([view], { type: 'audio/mp3' });
    }

    updateLanguage('en'); 
</script>
