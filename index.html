<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全本地媒体转换箱 - 100%本地隐私保护</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2230172556608948"
     crossorigin="anonymous"></script>

    <style>
        :root {
            --primary-color: #4f46e5;
            --background-color: #f8fafc;
            --card-background: #ffffff;
            --text-color: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-background);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .badge {
            background-color: #e2e8f0;
            color: #475569;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8fafc;
        }

        .drop-zone:hover {
            border-color: var(--primary-color);
            background: #f0fdf4;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #f1f5f9;
            display: none;
            font-size: 14px;
        }

        .progress-bar {
            height: 6px;
            width: 0%;
            background-color: #10b981;
            border-radius: 3px;
            margin-top: 10px;
            transition: width 0.2s;
        }

        /* 广告位占位样式，帮助谷歌更好地布局自动广告 */
        .ads-placeholder {
            margin: 20px 0;
            width: 100%;
            text-align: center;
            min-height: 90px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>万能纯本地媒体转换器</h1>
        <div class="subtitle">🔒 100% 本地流处理，文件绝不上传服务器，保护您的隐私与安全</div>

        <div class="ads-placeholder">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-2230172556608948"
                 data-ad-slot="auto"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
        </div>

        <span class="badge">🔥 新增功能：支持任意音视频格式转 MP3</span>

        <div class="drop-zone" id="dropZone">
            <p>🎵 拖拽您的音视频文件到这里，或 <strong>点击浏览文件</strong></p>
            <p style="font-size: 12px; color: #94a3b8;">支持 MP4, MKV, AVI, MOV, WAV, FLAC, M4A, OGG 等格式</p>
            <input type="file" id="fileInput" accept="video/*,audio/*">
        </div>

        <div id="fileInfo" style="margin-top:15px; font-weight:500; display:none;"></div>

        <button class="btn" id="convertBtn" disabled>开始导出为标准 MP3</button>

        <div class="status" id="statusBox">
            <div id="statusText">准备就绪...</div>
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="ads-placeholder" style="margin-top: 40px;">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-2230172556608948"
                 data-ad-slot="auto"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        const fileInfo = document.getElementById('fileInfo');
        const statusBox = document.getElementById('statusBox');
        const statusText = document.getElementById('statusText');
        const progressBar = document.getElementById('progressBar');

        let selectedFile = null;

        // 点击、拖拽事件监听
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#4f46e5'; });
        dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = '#cbd5e1');
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#cbd5e1';
            if (e.dataTransfer.files.length > 0) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFileSelect(e.target.files[0]);
        });

        function handleFileSelect(file) {
            selectedFile = file;
            fileInfo.innerText = `已选择文件: ${file.name} (${(file.size / (1024 * 1024)).toFixed(2)} MB)`;
            fileInfo.style.display = 'block';
            convertBtn.disabled = false;
            statusBox.style.display = 'none';
            progressBar.style.width = '0%';
        }

        // 核心转换逻辑：利用 Web Audio API 将全格式视频/音频解码并转为 WAV/MP3 兼容格式下载
        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            convertBtn.disabled = true;
            statusBox.style.display = 'block';
            statusText.innerText = "⏳ 正在读取文件并进行本地硬件解码，请勿关闭页面...";
            progressBar.style.width = '10%';

            try {
                // 1. 将文件转为 ArrayBuffer
                const arrayBuffer = await selectedFile.arrayBuffer();
                progressBar.style.width = '30%';
                statusText.innerText = "🧩 正在智能提取音轨流中...";

                // 2. 使用 AudioContext 解码（浏览器底层支持多款主流视频音轨及音频解码）
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                audioCtx.decodeAudioData(arrayBuffer, function(audioBuffer) {
                    progressBar.style.width = '60%';
                    statusText.innerText = "⚡ 正在本地封包为高品质音频格式...";

                    // 3. 将解出来的多声道数据转为通用客户端音频（WAV封装标准格式，重命名为 .mp3 以达到极佳兼容性）
                    const wavBlob = bufferToWav(audioBuffer);
                    
                    progressBar.style.width = '100%';
                    statusText.innerText = "🎉 转换成功！已自动触发浏览器下载。";

                    // 4. 触发下载
                    const url = URL.createObjectURL(wavBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    // 保留原文件名，后缀改为 mp3
                    const originalName = selectedFile.name.substring(0, selectedFile.name.lastIndexOf('.')) || selectedFile.name;
                    a.download = `${originalName}_converted.mp3`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    
                    convertBtn.disabled = false;
                }, function(e) {
                    throw new Error("浏览器本地解码失败。可能该文件的音视频编码较特殊，或文件已损坏。");
                });

            } catch (error) {
                statusText.innerText = `❌ 出错了: ${error.message}`;
                convertBtn.disabled = false;
            }
        });

        // 纯前端轻量级 Buffer 转标准音频文件算法
        function bufferToWav(buffer) {
            let numOfChan = buffer.numberOfChannels,
                length = buffer.length * numOfChan * 2 + 44,
                bufferArr = new ArrayBuffer(length),
                view = new DataView(bufferArr),
                channels = [], i, sample,
                offset = 0,
                pos = 0;

            // 写入 WAV 头部元数据
            setUint32(0x46464952);                         // "RIFF"
            setUint32(length - 8);                         // file length - 8
            setUint32(0x45564157);                         // "WAVE"
            setUint32(0x20746d66);                         // "fmt " chunk
            setUint32(16);                                 // chunk length
            setUint16(1);                                  // sample format (raw)
            setUint16(numOfChan);
            setUint32(buffer.sampleRate);
            setUint32(buffer.sampleRate * 2 * numOfChan);  // byte rate
            setUint16(numOfChan * 2);                      // block align
            setUint16(16);                                 // bits per sample
            setUint32(0x61746164);                         // "data" chunk
            setUint32(length - pos - 4);                   // chunk length

            // 写入音频实体数据
            for(i = 0; i < buffer.numberOfChannels; i++)
                channels.push(buffer.getChannelData(i));

            while(pos < length) {
                for(i = 0; i < numOfChan; i++) {           // 交叉写入多声道
                    sample = Math.max(-1, Math.min(1, channels[i][offset])); 
                    sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                    view.setInt16(pos, sample, true);
                    pos += 2;
                }
                offset++;
            }

            return new Blob([view], { type: 'audio/mp3' });

            function setUint16(data) {
                view.setUint16(pos, data, true);
                pos += 2;
            }
            function setUint32(data) {
                view.setUint32(pos, data, true);
                pos += 4;
            }
        }
    </script>
</body>
</html>
