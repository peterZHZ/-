    const dropZone = document.getElementById('dropZone');

    const countdownText = document.getElementById('countdownText');

    function updateLanguage(lang) {
        if (lang === 'ar') document.body.setAttribute('dir', 'rtl');
        else document.body.setAttribute('dir', 'ltr');

        document.getElementById('privacyBadge').textContent = i18n[lang].badge;
        document.getElementById('mainTitle').innerHTML = i18n[lang].title;
        document.getElementById('formatLabel').textContent = i18n[lang].formatLabel;

        document.getElementById('optMp3').textContent = i18n[lang].optMp3;
        document.getElementById('dropZoneText').innerHTML = i18n[lang].dropText;
        document.getElementById('subText').textContent = i18n[lang].subText;
    }

    langSelect.addEventListener('change', (e) => updateLanguage(e.target.value));

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) startBatchProcess(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) startBatchProcess(e.target.files);
    });

    // 核心主控：批量管理倒计时与异步转换
    async function startBatchProcess(files) {
        const currentLang = langSelect.value;
        const targetFormat = formatSelect.value;
        const validFiles = Array.from(files).filter(f => f.type.startsWith('image/') || f.type.startsWith('audio/') || f.type.startsWith('video/'));

        if (validFiles.length === 0) {
            alert(i18n[currentLang].alert);
            return;
        }

        // 重置UI
        downloadContainer.innerHTML = '';
        downloadContainer.style.display = 'none';
        countdownPanel.style.display = 'block';

        // 判断是否包含音视频
        const hasMedia = validFiles.some(f => f.type.startsWith('audio/') || f.type.startsWith('video/'));

        // 1. 启动 5 秒全局倒计时
        let timeLeft = 5;
        countdownText.innerText = `${i18n[currentLang].processing} ${timeLeft}s`;
        
        const timerPromise = new Promise((resolve) => {
            const timer = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    let extra = hasMedia ? i18n[langSelect.value].decoding : "";
                    countdownText.innerText = `${i18n[langSelect.value].processing} ${timeLeft}s${extra}`;
                } else {
                    clearInterval(timer);
                    resolve();
                }
            }, 1000);
        });

        // 2. 启动批量转换 Promise 并发执行
        const conversionPromises = validFiles.map(file => {
            const isMedia = file.type.startsWith('audio/') || file.type.startsWith('video/');
            // 如果用户传的是视频，但格式选了图片，则强制转 mp3；如果传图片但选了mp3，强制转 webp/jpg
            let specificTarget = targetFormat;
            if (isMedia) specificTarget = 'mp3';
            if (!isMedia && specificTarget === 'mp3') specificTarget = 'jpg'; 

            return isMedia ? processMedia(file) : processImage(file, specificTarget);
        });

        try {
            // Promise.all 等待时间走完，且所有文件处理完毕
            const results = await Promise.all([timerPromise, ...conversionPromises]);
            const convertedData = results.slice(1); // 刨除第一个定时器的结果
            
            countdownPanel.style.display = 'none';
            downloadContainer.style.display = 'flex';

            // 渲染批量下载列表
            convertedData.forEach(data => {
                const btn = document.createElement('a');
                btn.className = 'download-btn';
                btn.href = data.url;
                btn.download = data.filename;
                
                // 内部排版：左侧名字，右侧格式和尺寸
                const nameSpan = document.createElement('span');
                nameSpan.style.overflow = 'hidden';
                nameSpan.style.textOverflow = 'ellipsis';
                nameSpan.style.whiteSpace = 'nowrap';
                nameSpan.style.maxWidth = '60%';
                nameSpan.innerText = data.filename;

                const metaSpan = document.createElement('span');
                metaSpan.style.fontSize = '12px';
                metaSpan.style.opacity = '0.9';
                metaSpan.innerText = `${i18n[currentLang].btnText} ${data.meta}`;

                btn.appendChild(nameSpan);
                btn.appendChild(metaSpan);
                downloadContainer.appendChild(btn);
            });

        } catch (error) {
            countdownPanel.style.display = 'none';
            alert(`Error processing batch: ${error.message || error}`);
        }
    }

    // 图片处理算法 (增加了 JPG 白色背景处理)
    function processImage(file, targetFormat) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');

                    // ⚠️ 如果目标是 JPG，必须先铺一层白底，防止透明 PNG 变黑底
                    if (targetFormat === 'jpg') {
                        ctx.fillStyle = '#FFFFFF';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    }
                    
                    ctx.drawImage(img, 0, 0);

                    let mimeType = 'image/png';
                    let quality = undefined;
                    
                    if (targetFormat === 'webp') {
                        mimeType = 'image/webp';
                        quality = 0.8;
                    } else if (targetFormat === 'jpg') {
                        mimeType = 'image/jpeg';
                        quality = 0.9;
                    }
                    
                    const dataUrl = canvas.toDataURL(mimeType, quality);
                    const originalName = file.name.substring(0, file.name.lastIndexOf('.')) || 'image';
                    
                    resolve({
                        url: dataUrl,
                        filename: originalName + '.' + targetFormat,
                        meta: `(${targetFormat.toUpperCase()} ${img.width}x${img.height})`
                    });
                };
                img.onerror = () => reject("Image load error");
                img.src = event.target.result;
            };
            reader.onerror = () => reject("File read error");
            reader.readAsDataURL(file);
        });
    }

    // 音视频转MP3底层硬件解码封装
    async function processMedia(file) {
        return new Promise(async (resolve, reject) => {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                audioCtx.decodeAudioData(arrayBuffer, function(audioBuffer) {
                    const wavBlob = bufferToWav(audioBuffer);
                    const url = URL.createObjectURL(wavBlob);
                    const originalName = file.name.substring(0, file.name.lastIndexOf('.')) || 'media';
                    
                    resolve({
                        url: url,
                        filename: originalName + '_converted.mp3',
                        meta: `(MP3 Extract)`
                    });
                }, function(e) {
                    reject(`Media decoding failed for ${file.name}`);
                });
            } catch (err) {
                reject(err);
            }
        });
    }

    // 纯前端二进制音频封装算法
    function bufferToWav(buffer) {
        let numOfChan = buffer.numberOfChannels,
            length = buffer.length * numOfChan * 2 + 44,
            bufferArr = new ArrayBuffer(length),
            view = new DataView(bufferArr),
            channels = [], i, sample, offset = 0, pos = 0;
        function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
        function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }
        setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157); setUint32(0x20746d66);
        setUint32(16); setUint16(1); setUint16(numOfChan); setUint32(buffer.sampleRate);
        setUint32(buffer.sampleRate * 2 * numOfChan); setUint16(numOfChan * 2); setUint16(16);
        setUint32(0x61746164); setUint32(length - pos - 4);
        for(i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));
        while(pos < length) {
            for(i = 0; i < numOfChan; i++) {
                sample = Math.max(-1, Math.min(1, channels[i][offset])); 
                sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                view.setInt16(pos, sample, true); pos += 2;
            }
            offset++;
        }
        return new Blob([view], { type: 'audio/mp3' });
    }

    updateLanguage('en');
